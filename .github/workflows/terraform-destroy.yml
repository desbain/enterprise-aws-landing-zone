name: Destroy AWS Landing Zone

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type DESTROY to permanently delete the AWS resources"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-2
  TF_VERSION: "1.13.5"

concurrency:
  group: terraform-landing-zone-destroy
  cancel-in-progress: false

jobs:
  confirm:
    name: Confirm destroy request
    runs-on: ubuntu-latest

    steps:
      - name: Verify confirmation
        shell: bash
        run: |
          if [[ "${{ inputs.confirmation }}" != "DESTROY" ]]; then
            echo "::error::Destruction was not confirmed."
            echo "Run the workflow again and type DESTROY exactly."
            exit 1
          fi

          echo "Destruction confirmed."

  destroy:
    name: Destroy - ${{ matrix.module }}
    needs: confirm
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        module:
          - inspector
          - securityhub
          - guardduty
          - access-analyzer
          - config
          - cloudtrail
          - backup

    defaults:
      run:
        shell: bash
        working-directory: terraform/${{ matrix.module }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate AWS role secret
        shell: bash
        working-directory: .
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::The AWS_ROLE_ARN repository secret is missing."
            echo "Create it under:"
            echo "Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi

          if [[ ! "$AWS_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
            echo "::error::AWS_ROLE_ARN is not a valid IAM role ARN."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: terraform-destroy-${{ matrix.module }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Verify module directory
        run: |
          if [[ ! -f "main.tf" ]] && [[ ! -f "terraform.tf" ]] && [[ ! -f "providers.tf" ]]; then
            echo "::error::No Terraform configuration was found in terraform/${{ matrix.module }}"
            exit 1
          fi

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Show Terraform state
        run: |
          echo "Resources currently tracked by Terraform:"
          terraform state list || true

      - name: Create destroy plan
        run: |
          terraform plan \
            -destroy \
            -input=false \
            -no-color \
            -out=destroy.tfplan

      - name: Destroy resources
        run: terraform apply -input=false -auto-approve destroy.tfplan