name: Terraform Landing Zone

on:
  push:
    branches:
      - main
      - feature/organizations
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"

  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: us-east-2
  TF_VERSION: "1.13.5"

jobs:
  terraform:
    name: Terraform - ${{ matrix.module }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module:
          - access-analyzer
          - backup
          - cloudtrail
          - config
          - guardduty
          - inspector
          - securityhub

    defaults:
      run:
        shell: bash
        working-directory: terraform/${{ matrix.module }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate AWS role secret
        shell: bash
        working-directory: .
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
        run: |
          if [[ -z "$AWS_ROLE_ARN" ]]; then
            echo "::error::The AWS_ROLE_ARN repository secret is missing."
            echo "Create it under:"
            echo "Settings > Secrets and variables > Actions > New repository secret"
            exit 1
          fi

          if [[ ! "$AWS_ROLE_ARN" =~ ^arn:aws:iam::[0-9]{12}:role/.+ ]]; then
            echo "::error::AWS_ROLE_ARN is not a valid IAM role ARN."
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: github-terraform-${{ matrix.module }}
          aws-region: ${{ env.AWS_REGION }}
          mask-aws-account-id: true

      - name: Verify AWS identity
        run: aws sts get-caller-identity

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Terraform version
        run: terraform version

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -no-color